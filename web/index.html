<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0c0c12">
    <meta name="description" content="AI pixel art sprite generator. 108 classes. Runs offline.">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Pixel Forge</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0c0c12; }
        canvas { width: 100%; height: 100%; display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00d9ff; font-family: monospace; font-size: 18px; text-align: center;
        }
        #loading .spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner">&#9881;</div>
        <p>Loading Pixel Forge...</p>
        <p style="font-size: 12px; color: #787c8c; margin-top: 8px;">First load downloads ~10 MB model</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
    <script type="module">
        // wasm-bindgen generated glue — run after build:
        // wasm-bindgen target/wasm32-unknown-unknown/release/pixel_forge.wasm --out-dir web/ --target web
        import init from './pixel_forge.js';
        init().then(() => {
            document.getElementById('loading').style.display = 'none';
        }).catch(e => {
            document.getElementById('loading').innerHTML =
                '<p style="color: #ff4444;">Failed to load: ' + e.message + '</p>';
        });
    </script>
</body>
</html>
